name: Build Arnis

on:
  release:
    types: [created]
  workflow_dispatch: # Enables the manual "Run workflow" button in the Actions tab

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: arnis.exe
            asset_name: arnis-windows.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: arnis
            asset_name: arnis-linux
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: arnis
            asset_name: arnis-mac-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: arnis
            asset_name: arnis-mac-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev build-essential pkg-config libglib2.0-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Install dependencies
        run: cargo fetch

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for release
        shell: bash
        run: |
          mkdir -p target/release/
          mv target/${{ matrix.target }}/release/${{ matrix.binary_name }} target/release/${{ matrix.asset_name }}

      - name: Set executable permission
        if: matrix.os != 'windows-latest'
        run: chmod +x target/release/${{ matrix.asset_name }}

      - name: Package binary as tar.gz
        if: matrix.os != 'windows-latest'
        run: tar -czf target/release/${{ matrix.asset_name }}.tar.gz -C target/release ${{ matrix.asset_name }}

      - name: Self-sign Windows executable
        if: matrix.os == 'windows-latest'
        run: |
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -Force -AsPlainText
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject 'CN=Arnis' -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(5)
          Export-PfxCertificate -Cert $cert -FilePath arnis-cert.pfx -Password $password
          # Note: signtool is usually in the path on windows-latest runners
          signtool sign /f arnis-cert.pfx /p $env:WINDOWS_CERT_PASSWORD /t http://timestamp.digicert.com target/release/${{ matrix.asset_name }}
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.target }}-build
          path: target/release/${{ matrix.asset_name }}${{ matrix.os != 'windows-latest' && '.tar.gz' || '' }}

  create-universal-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download macOS Intel build
        uses: actions/download-artifact@v4
        with:
          name: macos-15-intel-x86_64-apple-darwin-build
          path: ./intel

      - name: Download macOS ARM64 build
        uses: actions/download-artifact@v4
        with:
          name: macos-latest-aarch64-apple-darwin-build
          path: ./arm64

      - name: Extract Intel and ARM64 binaries
        run: |
          tar -xzf ./intel/arnis-mac-intel.tar.gz -C ./intel
          tar -xzf ./arm64/arnis-mac-arm64.tar.gz -C ./arm64

      - name: Create universal binary
        run: |
          lipo -create -output arnis-mac-universal ./intel/arnis-mac-intel ./arm64/arnis-mac-arm64
          chmod +x arnis-mac-universal
          tar -czf arnis-mac-universal.tar.gz arnis-mac-universal

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-build
          path: arnis-mac-universal.tar.gz

  release:
    needs: [build, create-universal-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for uploading to Releases
    steps:
      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-latest-x86_64-pc-windows-msvc-build
          path: ./builds/windows

      - name: Download Linux build artifact
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest-x86_64-unknown-linux-gnu-build
          path: ./builds/linux

      - name: Download macOS universal build artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-universal-build
          path: ./builds/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' # Only run this step if an actual release was created
        with:
          files: |
            builds/windows/arnis-windows.exe
            builds/linux/arnis-linux.tar.gz
            builds/macos/arnis-mac-universal.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
